<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="50%" style="stop-color:#f0d08a"/>
      <stop offset="100%" style="stop-color:#c4943d"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#gold)" stroke-width="8"/>
  
  <!-- Film camera / clapperboard body -->
  <rect x="130" y="220" width="252" height="170" rx="16" fill="none" stroke="url(#gold)" stroke-width="10"/>
  
  <!-- Clapperboard top -->
  <path d="M130 220 L130 180 L382 180 L382 220" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
  
  <!-- Clapper stripes -->
  <line x1="160" y1="180" x2="185" y2="220" stroke="url(#gold)" stroke-width="6"/>
  <line x1="210" y1="180" x2="235" y2="220" stroke="url(#gold)" stroke-width="6"/>
  <line x1="260" y1="180" x2="285" y2="220" stroke="url(#gold)" stroke-width="6"/>
  <line x1="310" y1="180" x2="335" y2="220" stroke="url(#gold)" stroke-width="6"/>
  
  <!-- Play triangle in center -->
  <polygon points="228,275 228,355 298,315" fill="url(#gold)"/>
  
  <!-- Film reel circle top-left -->
  <circle cx="170" cy="145" r="30" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <circle cx="170" cy="145" r="8" fill="url(#gold)"/>
  
  <!-- Film strip holes on sides -->
  <rect x="115" y="240" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="115" y="270" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="115" y="300" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="115" y="330" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="115" y="360" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  
  <rect x="385" y="240" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="385" y="270" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="385" y="300" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="385" y="330" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
  <rect x="385" y="360" width="12" height="12" rx="2" fill="url(#gold)" opacity="0.5"/>
</svg>